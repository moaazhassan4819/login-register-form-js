<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Login Account</h1>

    <form onsubmit="loginAccount(); return false">
          <label for="userEmail">
                UserEmail: 
                <div class="input-container">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="userEmail" placeholder="Useremail" required>
                </div>
            </label>

            <label for="user`Password">
                UserPassword: 
                <div class="input-container">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="userPassword" placeholder="Password" required>
                </div>
            </label>
        <button>Login Account</button>
        
        <a href="register.html">
            Don't Have an Account ? <span>Sign in</span>
        </form>
    </a>
    
    <script src="script.js"></script>
</body>
</html>
